<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Icons Assets</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --fg: #171717;
        --muted: #666b73;
        --line: #d8d8d2;
        --card: #ffffff;
        --accent: #12664f;
        --chip: #e7ece7;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151618;
          --fg: #f3f1ea;
          --muted: #a6a8ad;
          --line: #34363a;
          --card: #1e2023;
          --accent: #78d7b4;
          --chip: #2a302d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--bg);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--card);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .top {
        display: grid;
        gap: 18px;
        padding: 28px 0 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 52px);
        line-height: 1;
        letter-spacing: 0;
      }

      .summary {
        max-width: 760px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      input,
      select {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--fg);
        background: var(--bg);
        font: inherit;
      }

      main {
        padding: 22px 0 42px;
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 12px;
      }

      .card {
        display: grid;
        grid-template-columns: 46px 1fr;
        gap: 12px;
        min-height: 118px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
      }

      .iconBox {
        display: grid;
        place-items: center;
        width: 46px;
        height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
      }

      .iconBox img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .name {
        margin: 0 0 5px;
        font-size: 16px;
        line-height: 1.25;
      }

      .families {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        grid-column: 1 / -1;
        margin-top: 2px;
      }

      .chip {
        padding: 4px 7px;
        border-radius: 999px;
        color: var(--muted);
        background: var(--chip);
        font-size: 12px;
        line-height: 1;
      }

      .links {
        display: flex;
        gap: 12px;
        grid-column: 1 / -1;
        font-size: 13px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .empty {
        display: none;
        padding: 36px 0;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap top">
        <div>
          <h1>Model Icons Assets</h1>
          <p class="summary">主流大模型、AI 产品和推理平台图标索引。支持搜索、分类过滤和直接复制图标 URL。</p>
        </div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索品牌、模型、国家..." />
          <select id="category" aria-label="按分类筛选">
            <option value="">全部分类</option>
          </select>
        </div>
      </div>
    </header>
    <main class="wrap">
      <div class="meta">
        <span id="count">0 items</span>
        <a href="../catalog/models.json">catalog/models.json</a>
      </div>
      <section id="grid" class="grid" aria-live="polite"></section>
      <p id="empty" class="empty">没有匹配的图标。</p>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="iconBox">
          <img alt="" loading="lazy" />
        </div>
        <div>
          <h2 class="name"></h2>
          <p class="families"></p>
        </div>
        <div class="chips"></div>
        <div class="links">
          <a class="website" target="_blank" rel="noreferrer">Website</a>
          <a class="icon" target="_blank" rel="noreferrer">Icon</a>
        </div>
      </article>
    </template>

    <script>
      const state = {
        items: [],
        query: "",
        category: ""
      };

      const els = {
        search: document.querySelector("#search"),
        category: document.querySelector("#category"),
        count: document.querySelector("#count"),
        grid: document.querySelector("#grid"),
        empty: document.querySelector("#empty"),
        template: document.querySelector("#cardTemplate")
      };

      const normalize = (value) => String(value || "").toLowerCase();

      function matches(item) {
        const haystack = normalize([
          item.name,
          item.id,
          item.country,
          item.category,
          ...(item.modelFamilies || [])
        ].join(" "));
        return (!state.query || haystack.includes(state.query)) && (!state.category || item.category === state.category);
      }

      function render() {
        const items = state.items.filter(matches);
        els.grid.replaceChildren();
        els.count.textContent = `${items.length} / ${state.items.length} items`;
        els.empty.style.display = items.length ? "none" : "block";

        for (const item of items) {
          const iconHref = `../${item.icon.path}`;
          const node = els.template.content.cloneNode(true);
          node.querySelector("img").src = iconHref;
          node.querySelector("img").alt = `${item.name} icon`;
          node.querySelector(".name").textContent = item.name;
          node.querySelector(".families").textContent = item.modelFamilies.join(", ");
          node.querySelector(".website").href = item.website;
          node.querySelector(".icon").href = iconHref;

          const chips = node.querySelector(".chips");
          for (const value of [item.category, item.country, item.icon.type]) {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = value;
            chips.append(chip);
          }
          els.grid.append(node);
        }
      }

      async function init() {
        const response = await fetch("../catalog/models.json");
        const catalog = await response.json();
        state.items = catalog.items.sort((a, b) => a.name.localeCompare(b.name));

        const categories = [...new Set(state.items.map((item) => item.category))].sort();
        for (const category of categories) {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          els.category.append(option);
        }

        els.search.addEventListener("input", (event) => {
          state.query = normalize(event.target.value.trim());
          render();
        });
        els.category.addEventListener("change", (event) => {
          state.category = event.target.value;
          render();
        });
        render();
      }

      init().catch((error) => {
        els.empty.style.display = "block";
        els.empty.textContent = `加载失败：${error.message}`;
      });
    </script>
  </body>
</html>
